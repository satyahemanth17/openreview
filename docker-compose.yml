services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - openreview

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/openreview
      - JWT_SECRET=${JWT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - FRONTEND_URL=http://localhost:3001
    depends_on:
      - mongodb
    networks:
      - openreview
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:5001
        NEXT_PUBLIC_SOCKET_URL: http://backend:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - openreview
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  openreview:
    driver: bridge
